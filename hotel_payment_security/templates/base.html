<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}SecureStay Hotels{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 1.5rem; font-weight: 700; }
        header span { font-size: 0.85rem; opacity: 0.8; }
        nav {
            background: #1a3a5c;
            padding: 8px 32px;
            display: flex;
            gap: 20px;
        }
        nav a {
            color: #a8c8e8;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        nav a:hover { color: white; border-bottom-color: #4ca8e8; }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 36px;
            margin-bottom: 24px;
        }
        .card h2 {
            color: #1a3a5c;
            font-size: 1.4rem;
            margin-bottom: 8px;
            border-bottom: 2px solid #e8f0fa;
            padding-bottom: 12px;
        }
        .card p.subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #dce8f5;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: #2d6a9f; }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }
        .btn {
            background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .security-badge {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>SecureStay Hotels and Travel</h1>
            <span>Trusted booking powered by secure technology</span>
        </div>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/booking">Book a Hotel</a>
        <a href="/search">Search Destinations</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        SecureStay Hotels and Travel &mdash; Secure Payment Demonstration
    </footer>
</body>
</html>
